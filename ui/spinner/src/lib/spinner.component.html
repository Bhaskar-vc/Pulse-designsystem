<div style="display:flex;align-items:center;justify-content:center;" role="status" [attr.aria-label]="ariaLabel">
  <svg [class]="spinnerClasses" viewBox="0 0 50 50" aria-hidden="true">
    <circle
      class="path"
      cx="25"
      cy="25"
      r="20"
      fill="none"
      stroke="currentColor"
      stroke-width="5"
      stroke-linecap="round"
    ></circle>
  </svg>
  <span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">{{ ariaLabel }}</span>
</div>

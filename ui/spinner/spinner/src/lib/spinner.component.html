<div class="flex justify-center items-center" role="status" [attr.aria-label]="ariaLabel">
  <svg [class]="spinnerClasses" viewBox="0 0 50 50" aria-hidden="true">
    <circle
      class="path"
      cx="25"
      cy="25"
      r="20"
      fill="none"
      stroke="currentColor"
      stroke-width="5"
      stroke-linecap="round"
    ></circle>
  </svg>
  <span class="sr-only">{{ ariaLabel }}</span>
</div>

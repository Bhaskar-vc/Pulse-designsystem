<div class="rating" [class]="ratingClass" [attr.aria-label]="ariaLabel" role="img">
  @for (star of stars; track $index) {
    @if (star === 'full') {
      <span class="star-wrap" (click)="interactive ? setRating($index + 1) : null" [attr.tabindex]="interactive ? 0 : null" (keydown.enter)="interactive ? setRating($index + 1) : null">
        <svg [attr.viewBox]="'0 0 20 20'" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path [class]="starFillClass" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </span>
    } @else if (star === 'half') {
      <span class="star-half-wrap">
        <svg [attr.viewBox]="'0 0 20 20'" xmlns="http://www.w3.org/2000/svg" class="star-bg" aria-hidden="true">
          <path class="star-empty" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
        <svg [attr.viewBox]="'0 0 20 20'" xmlns="http://www.w3.org/2000/svg" class="star-fg" aria-hidden="true">
          <path [class]="starFillClass" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </span>
    } @else {
      <span class="star-wrap" (click)="interactive ? setRating($index + 1) : null" [attr.tabindex]="interactive ? 0 : null" (keydown.enter)="interactive ? setRating($index + 1) : null">
        <svg [attr.viewBox]="'0 0 20 20'" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="star-empty" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </span>
    }
  }
  @if (count !== null && count !== undefined) {
    <span class="rating-count">({{ count }})</span>
  }
  @if (showValue) {
    <span class="rating-value">{{ value }}</span>
  }
</div>

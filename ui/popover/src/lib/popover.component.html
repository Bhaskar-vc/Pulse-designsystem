<!-- Trigger wrapper — click toggles popover -->
<div class="pop-trigger" (click)="toggle()">
  <ng-content select="[trigger]"></ng-content>
</div>

<!-- Floating panel -->
@if (isOpen) {
  <div
    [class]="panelClass"
    @pop
    (click)="$event.stopPropagation()"
  >
    <!-- Arrow pointer -->
    @if (showArrow) {
      <div [class]="arrowClass"></div>
    }

    <!-- Header (only when title is provided) -->
    @if (title) {
      <div class="pop-header">
        <span class="pop-title">{{ title }}</span>
        <button type="button" class="pop-close" (click)="close()" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    }

    <!-- Body — default content slot -->
    <div class="pop-body">
      <ng-content></ng-content>
    </div>

    <!-- Footer — optional action slot -->
    <ng-content select="[footer]"></ng-content>
  </div>
}

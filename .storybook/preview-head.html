<!-- Back-to-Docs button injected into canvas view only -->
<script>
(function () {
  var BTN_ID = 'pulse-back-to-docs';

  function isCanvasMode() {
    try {
      var s = window.parent.location.search;
      return s.indexOf('/story/') !== -1;
    } catch (e) { return false; }
  }

  function getDocsPath() {
    try {
      var s = window.parent.location.search;
      var m = s.match(/path=\/story\/([^&]+)/);
      if (!m) return '';
      return m[1].replace(/--[^]*$/, '--docs');
    } catch (e) { return ''; }
  }

  function injectBtn() {
    if (document.getElementById(BTN_ID)) return;
    if (!isCanvasMode()) return;
    var docsPath = getDocsPath();
    if (!docsPath) return;
    var isDark = false;
    try { isDark = localStorage.getItem('pulse-theme') === 'dark'; } catch (e) {}

    var btn = document.createElement('button');
    btn.id = BTN_ID;
    btn.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">' +
      '<path d="M10 3L6 8l4 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg><span>Docs</span>';
    btn.style.cssText =
      'position:fixed;top:14px;left:14px;z-index:9999;' +
      'display:inline-flex;align-items:center;gap:5px;' +
      'padding:5px 12px 5px 9px;' +
      'background:' + (isDark ? '#2a2f40' : '#f0eeff') + ';' +
      'border:1px solid ' + (isDark ? '#353858' : '#d6bbfb') + ';' +
      'border-radius:20px;' +
      'color:' + (isDark ? '#b39ff7' : '#6941c6') + ';' +
      'font-family:Inter,sans-serif;font-size:11px;font-weight:600;' +
      'cursor:pointer;line-height:1;' +
      'box-shadow:0 1px 6px rgba(105,65,198,0.15);' +
      'transition:box-shadow 0.15s;';

    btn.addEventListener('click', function () {
      var dp = getDocsPath();
      if (dp) {
        try { window.parent.location.href = window.parent.location.pathname + '?path=/docs/' + dp; } catch (e) {}
      }
    });

    var mount = function () { if (document.body && !document.getElementById(BTN_ID)) document.body.appendChild(btn); };
    if (document.body) mount(); else document.addEventListener('DOMContentLoaded', mount);
  }

  /* Run after DOM is ready */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectBtn);
  } else {
    injectBtn();
  }
})();
</script>

<!-- Zero-flash dark mode: runs synchronously in <head> before any paint -->
<script>
(function () {
  var DARK_BG   = '#242933';
  var DARK_TEXT = '#e9ecf5';
  var STYLE_ID  = 'pulse-dark-flash';

  function getTheme() {
    try {
      var m = (new URLSearchParams(location.search).get('globals') || '').match(/theme:(\w+)/);
      if (m) return m[1];
    } catch (e) {}
    try { return localStorage.getItem('pulse-theme') || 'light'; } catch (e) {}
    return 'light';
  }

  function paintDark() {
    document.documentElement.style.backgroundColor = DARK_BG;
    document.documentElement.style.color = DARK_TEXT;
    /* Inject <style> targeting body/roots — document.body doesn't exist yet */
    if (!document.getElementById(STYLE_ID)) {
      var s = document.createElement('style');
      s.id = STYLE_ID;
      s.textContent =
        'body,#storybook-root,#storybook-docs,' +
        '.sb-show-main,.sb-main-padded,.sb-main-centered,.sb-main-fullscreen{' +
        'background-color:' + DARK_BG + ' !important;color:' + DARK_TEXT + ' !important}';
      document.head.appendChild(s);
    }
  }

  function unpaintDark() {
    document.documentElement.style.backgroundColor = '';
    document.documentElement.style.color = '';
    var s = document.getElementById(STYLE_ID);
    if (s) s.remove();
    if (document.body) { document.body.style.backgroundColor = ''; document.body.style.color = ''; }
  }

  var theme = getTheme();
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('pulse-theme', theme); } catch (e) {}
  if (theme === 'dark') paintDark();

  /* Sync when toggle writes to localStorage (cross-frame storage event) */
  window.addEventListener('storage', function (e) {
    if (e.key !== 'pulse-theme') return;
    document.documentElement.setAttribute('data-theme', e.newValue === 'dark' ? 'dark' : 'light');
    if (e.newValue === 'dark') paintDark(); else unpaintDark();
  });
})();
</script>

<div class="table-container">
  <table class="data-table" [class]="tableClass" [attr.aria-label]="ariaLabel">
    <thead>
      <tr>
        @if (selectable) {
          <th class="col-check">
            <input
              type="checkbox"
              class="cb"
              [checked]="allSelected"
              [indeterminate]="someSelected && !allSelected"
              (change)="toggleAll($event)"
              aria-label="Select all rows"
            />
          </th>
        }
        @for (col of columns; track col.key) {
          <th
            [class.sortable]="col.sortable"
            [class.sort-asc]="sortColumn === col.key && sortDir === 'asc'"
            [class.sort-desc]="sortColumn === col.key && sortDir === 'desc'"
            [class.num]="col.numeric"
            [style.width]="col.width || null"
            (click)="col.sortable && onSort(col.key)"
          >
            <span class="th-inner">
              {{ col.label }}
              @if (col.sortable) {
                <span class="sort-icon" aria-hidden="true">
                  <svg class="chevron-up" viewBox="0 0 10 10" fill="none">
                    <path d="M2 7l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <svg class="chevron-down" viewBox="0 0 10 10" fill="none">
                    <path d="M2 3l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              }
            </span>
          </th>
        }
        <ng-content select="[extraHeaders]"></ng-content>
      </tr>
    </thead>
    <tbody>
      @for (row of rows; track trackRow($index, row)) {
        <tr [class.selected]="selectedRows.has(row)" (click)="onRowClick(row)">
          @if (selectable) {
            <td class="col-check">
              <input
                type="checkbox"
                class="cb"
                [checked]="selectedRows.has(row)"
                (click)="$event.stopPropagation()"
                (change)="toggleRow(row)"
                aria-label="Select row"
              />
            </td>
          }
          @for (col of columns; track col.key) {
            <td [class.num]="col.numeric">{{ row[col.key] }}</td>
          }
          <ng-content select="[rowActions]"></ng-content>
        </tr>
      }
      @if (rows.length === 0) {
        <tr>
          <td [attr.colspan]="columns.length + (selectable ? 1 : 0)" style="text-align:center; padding:32px 16px; color:#98a2b3;">
            No data
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

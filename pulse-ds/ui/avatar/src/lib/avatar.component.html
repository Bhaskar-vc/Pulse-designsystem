<div class="av-wrap" [class]="'av-wrap av-' + size">
  <div class="av" [class]="avatarClass" [attr.aria-label]="ariaLabel || null" [attr.role]="ariaLabel ? 'img' : null">
    @if (src) {
      <img [src]="src" [alt]="alt" loading="lazy" />
    } @else if (initials) {
      {{ displayInitials }}
    } @else {
      <svg viewBox="0 0 24 24" fill="currentColor" class="av-placeholder-icon" aria-hidden="true">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    }
  </div>
  @if (showOnline) {
    <span class="av-online" aria-label="Online" role="status"></span>
  }
  <ng-content></ng-content>
</div>

      <!-- Pulse DS — Manager shell dark mode (sidebar, toolbar, panels) -->
<script>
(function () {
  var BG     = '#242933';
  var MUTED  = '#2a2f40';
  var BORDER = '#353858';
  var TEXT   = '#e9ecf5';
  var TMID   = '#9aa3be';
  var TDIM   = '#6e7798';
  var INPUT  = '#2a2e44';
  var BRAND  = '#9b77ed';

  var STYLE_ID = 'pulse-manager-dark';

  /* Constructable stylesheet — always wins cascade vs <style> tags.
     Sheet is ONLY non-empty in dark mode, so no html[data-m-theme] scoping
     is needed — the sheet's presence IS the dark-mode gate.
     This avoids the failure mode where Storybook re-renders reset the
     data-m-theme attribute, silently dropping every rule. */
  var _sheet = null;

  function buildCSS() {
    return [
      /* Base */
      'html, body, #root { background:' + BG + ' !important; color:' + TEXT + ' !important; }',
      'nav, aside, header { background:' + BG + ' !important; border-color:' + BORDER + ' !important; }',
      'button { background:transparent !important; color:' + TMID + ' !important; border-color:' + BORDER + ' !important; }',
      'button:hover { background:' + MUTED + ' !important; color:' + TEXT + ' !important; }',
      'button[aria-pressed="true"] { color:' + BRAND + ' !important; }',
      'input { background:' + INPUT + ' !important; color:' + TEXT + ' !important; border-color:' + BORDER + ' !important; }',
      'input::placeholder { color:' + TDIM + ' !important; }',
      'a { color:' + TEXT + ' !important; }',
      'a:hover, a[aria-current="page"] { color:' + TEXT + ' !important; }',
      'span, p, label { color:inherit !important; }',
      'hr { background:' + BORDER + ' !important; border-color:' + BORDER + ' !important; }',
      'table, th, td { background:' + BG + ' !important; color:' + TEXT + ' !important; border-color:' + BORDER + ' !important; }',
      'select { background:' + INPUT + ' !important; color:' + TEXT + ' !important; border-color:' + BORDER + ' !important; }',
      '[data-selected="true"], [aria-selected="true"], [aria-current="page"] { background:#363d52 !important; color:' + TEXT + ' !important; }',
      'img[src*="VC-logo"] { filter:brightness(0) invert(1) !important; }',
      /* Canvas toolbar — all known Storybook toolbar patterns */
      '.sb-bar, [class*="sb-bar"], [class*="ToolbarWrapper"], [class*="toolbar-wrapper"], [class*="AddonBar"], [class*="ToolbarInner"], [role="toolbar"], .css-p1dfi6 { background:' + MUTED + ' !important; border-color:' + BORDER + ' !important; }',
      /* Toolbar fallback via :has (catches zoom-button parent) */
      'div:has(button[title*="zoom" i]), div:has(button[aria-label*="zoom" i]) { background:' + MUTED + ' !important; border-color:' + BORDER + ' !important; }',
      /* Specific Emotion class overrides (generated by Storybook theme) */
      '.css-xzp052 { background: #1f232d !important; }',
      '.css-l1e2yg { background: rgb(30, 35, 48) !important; }',
      '.css-1fdphfk { background: #171a1f !important; }',
      '.css-11xgcgt { background: transparent !important; }',
      /* Canvas wrapper + iframe — prevents white strip when scrolling */
      '[class*="LayoutCanvas"], [class*="LayoutPreview"], [class*="PreviewWrapper"], [class*="Canvas"], #storybook-preview-wrapper { background:' + BG + ' !important; }',
      'iframe { background:' + BG + ' !important; }',
      '::-webkit-scrollbar { width:5px; height:5px; }',
      '::-webkit-scrollbar-track { background:' + BG + '; }',
      '::-webkit-scrollbar-thumb { background:' + BORDER + '; border-radius:3px; }',
    ].join('\n');
  }

  function injectDark() {
    document.documentElement.setAttribute('data-m-theme', 'dark');
    /* Prefer constructable stylesheet — lives outside <head>, no cascade fights */
    try {
      if (!_sheet) {
        _sheet = new CSSStyleSheet();
        document.adoptedStyleSheets = Array.from(document.adoptedStyleSheets).concat([_sheet]);
      }
      _sheet.replaceSync(buildCSS());
      return;
    } catch (e) {}
    /* Fallback for browsers without CSSStyleSheet() constructor */
    var existing = document.getElementById(STYLE_ID);
    if (existing) { existing.textContent = buildCSS(); return; }
    var s = document.createElement('style');
    s.id = STYLE_ID;
    s.textContent = buildCSS();
    document.head.appendChild(s);
  }

  function removeDark() {
    document.documentElement.removeAttribute('data-m-theme');
    if (_sheet) { _sheet.replaceSync(''); return; }
    var el = document.getElementById(STYLE_ID);
    if (el) el.remove();
  }

  /* Initial load */
  try {
    var t = localStorage.getItem('pulse-theme') || 'light';
    if (t === 'dark') injectDark();
  } catch (e) {}

  /* React to toggle (cross-frame storage event) */
  window.addEventListener('storage', function (e) {
    if (e.key === 'pulse-theme') {
      if (e.newValue === 'dark') injectDark(); else removeDark();
    }
  });

  /* Polling — always re-applies dark CSS so Emotion re-injections can't win cascade */
  var _last = null;
  setInterval(function () {
    try {
      var v = localStorage.getItem('pulse-theme') || 'light';
      if (v === 'dark') {
        injectDark(); // re-apply every tick in dark mode (safe: macrotask, no loop)
        _last = 'dark';
      } else if (v !== _last) {
        _last = v; removeDark();
      }
    } catch (e) {}
  }, 500);
})();
</script>
